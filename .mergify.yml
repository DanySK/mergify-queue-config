pull_request_rules:
  - name: Auto-update with merge if appropriately labeled
    conditions:
      - label=auto-update-merge
      - -draft
      - -conflict
    actions:
      update:
        bot_account: danysk

  - name: ask to resolve conflict
    conditions:
      - conflict
    actions:
      comment:
        message: |
          Hi @{{author}}! :wave:
          This pull request has conflicts :confounded:

          Could you fix it? :wrench:

          Thank you! :pray:

  - name: Auto-rebase if appropriately labeled
    conditions:
      - label=auto-update-rebase
      - -draft
      - -conflict
    actions:
      rebase:
        bot_account: danysk


merge_protections:
  - name: CI success
    if:
      - -draft
    success_conditions:
      - check-success ~= .*success

merge_protections_settings:
  reporting_method: check-runs

  auto_merge_conditions: true
merge_queue:
  max_parallel_checks: 2
  reset_on_external_merge: always
  status_comments: outcomes

queue_rules:
  - name: squash-queue
    batch_size: 5
    branch_protection_injection_mode: merge
    merge_method: squash
    queue_conditions:
      - -draft
      - or:
          - label = merge-queue
          - author = renovate[bot]
          - author = dependabot[bot]
